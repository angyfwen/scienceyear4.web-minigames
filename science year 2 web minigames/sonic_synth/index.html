<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sonic synth</title>
    <!-- architects daughter for the handwritten feel -->
    <link href='https://fonts.googleapis.com/css?family=Lato:900,400|Architects+Daughter' rel='stylesheet' type='text/css'>
    <style>
        :root {
            /* unified dark outline color bestie !! (✧ω✧) */
            --black: #151515; 
            --white: #ffffff;
            --cream: #d4b483; /* yellowed/aged paper tone!! */
            --primary: #00b7c6;
            /* flat rust colors */
            --rust-dark: #4a3427;
            --rust-mid: #8b4513;
            --rust-light: #cd853f;
            /* screen colors */
            --screen-bg: #0a200a;
            --grid-line: #1b5e20;
            --marker: #39ff14;
            /* flat casing colors */
            --case-main: #6b6d62;
            --case-dark: #434739;
            --panel-bg: #36392e; /* background for the sub-panel */
            
            /* button specific colors */
            --button-flat: #5d6545;
            --button-active: #8b8f74;

            /* indicator light colors bestie !! */
            --led-red-off: #440000;
            --led-yellow-off: #443300;
            --led-green-off: #004400;
            
            --led-red-on: #aa0000;
            --led-yellow-on: #aa9900;
            --led-green-on: #00aa00;

            /* rust pattern texture */
            --rust-texture: 
                radial-gradient(circle at 10% 10%, rgba(74, 52, 39, 0.6) 0%, transparent 20%),
                radial-gradient(circle at 90% 90%, rgba(139, 69, 19, 0.5) 0%, transparent 25%),
                radial-gradient(circle at 50% 50%, rgba(205, 133, 63, 0.2) 0%, transparent 30%),
                radial-gradient(circle at 30% 80%, rgba(74, 52, 39, 0.5) 0%, transparent 15%),
                radial-gradient(circle at 80% 20%, rgba(139, 69, 19, 0.4) 0%, transparent 18%),
                radial-gradient(circle at 20% 60%, rgba(205, 133, 63, 0.3) 0%, transparent 12%),
                radial-gradient(circle at 70% 40%, rgba(74, 52, 39, 0.5) 0%, transparent 15%);
        }

        html {
            box-sizing: border-box;
            font-family: 'Lato', sans-serif;
            width: 100%;
            height: 100%;
            font-size: 62.5%;
            color: var(--black);
        }

        *, *:before, *:after { box-sizing: inherit; }

        body {
            width: 100%;
            height: 100%;
            font-size: 1.6em;
            background: #0f0f0f; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: lowercase;
        }

        .deviceBody {
            margin: 2em auto;
            width: auto;
            background: transparent;
            display: flex;
            justify-content: center;
        }

        /* main base - border made smaller bestie !! (◕‿◕) */
        .controlPadBase {
            width: 44em; 
            padding: 1.5em; 
            background-color: var(--case-main);
            background-image: var(--rust-texture);
            border: 5px solid var(--black); 
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .main-layout {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            justify-content: space-between;
            width: 100%;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            width: 12em;
            gap: 1.5em;
        }

        /* indicator lights grid !! */
        .fake-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.2em;
            padding: 0.5em;
            background: transparent;
            border: none;
            justify-items: center;
        }

        .led {
            width: 1.4em;
            height: 1.4em;
            border: 2px solid var(--black); 
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 2px 2px rgba(0,0,0,0.5);
            background-color: var(--black); 
            overflow: hidden;
        }

        .led-glow {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transition: all 0.15s ease-in-out;
            opacity: 0.5;
        }

        .led-glow::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 35%;
            height: 35%;
            background: rgba(255,255,255,0.2); 
            border-radius: 50%;
        }

        .red .led-glow { background-color: var(--led-red-off); }
        .yellow .led-glow { background-color: var(--led-yellow-off); }
        .green .led-glow { background-color: var(--led-green-off); }

        .red.active .led-glow { 
            background-color: var(--led-red-on); 
            box-shadow: inset 0 0 10px rgba(255,0,0,0.5);
            opacity: 1;
        }
        .yellow.active .led-glow { 
            background-color: var(--led-yellow-on); 
            box-shadow: inset 0 0 10px rgba(255,200,0,0.5);
            opacity: 1;
        }
        .green.active .led-glow { 
            background-color: var(--led-green-on); 
            box-shadow: inset 0 0 10px rgba(0,255,0,0.5);
            opacity: 1;
        }

        /* flat 2d serial plate bestie !! (๑˃ᴗ˂)ﻭ */
        .serial-plate {
            background-color: #8c8c8c;
            border: 2px solid var(--black); 
            padding: 0.5em;
            margin-top: 0.5em;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 0.6em;
            color: #222;
            letter-spacing: 0.1em;
            box-shadow: none; /* shadow removed bro !! */
            position: relative;
        }

        .serial-plate::before, .serial-plate::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--black);
            border-radius: 50%;
            top: 4px;
        }
        .serial-plate::before { left: 4px; }
        .serial-plate::after { right: 4px; }

        .ports-area {
            display: flex;
            justify-content: space-around;
            padding: 0.5em;
            margin-top: auto;
        }

        /* flat 2d jack ports bestie !! ٩(◕‿◕)۶ */
        .jack-port {
            width: 2.2em;
            height: 2.2em;
            background: #222;
            border: 3px solid var(--black); 
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: none; /* shadow removed bro !! */
            position: relative;
        }

        .jack-port::after {
            content: '';
            width: 0.8em;
            height: 0.8em;
            background: #000;
            border-radius: 50%;
            border: none; /* cleaner 2d look !! */
        }

        .port-label {
            position: absolute;
            bottom: -1.8em;
            font-size: 0.5em;
            font-weight: 900;
            color: var(--black);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.8;
        }

        .technical-panel {
            display: flex;
            flex-direction: column;
            width: 26em; 
            padding: 1.5em; 
            background-color: var(--panel-bg);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0,0,0,0.2) 0%, transparent 80%),
                radial-gradient(circle at 10% 90%, rgba(74, 52, 39, 0.7) 0%, transparent 30%),
                radial-gradient(circle at 90% 10%, rgba(139, 69, 19, 0.6) 0%, transparent 30%),
                radial-gradient(circle at 40% 40%, rgba(74, 52, 39, 0.4) 0%, transparent 15%);
            border: 4px solid var(--black); 
            position: relative;
            z-index: 1;
        }

        .screw {
            position: absolute;
            width: 1.1em;
            height: 1.1em;
            background: #333; 
            border: 2px solid var(--black);
            border-radius: 50%;
            box-shadow: inset 0 0 6px var(--rust-dark);
        }
        .screw::before, .screw::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 15%;
            width: 70%;
            height: 2px;
            background: var(--black);
            margin-top: -1px;
        }
        .screw::before { transform: rotate(45deg); }
        .screw::after { transform: rotate(-45deg); }

        .screw-tl { top: 0.5em; left: 0.5em; }
        .screw-tr { top: 0.5em; right: 0.5em; }
        .screw-bl { bottom: 0.5em; left: 0.5em; }
        .screw-br { bottom: 0.5em; right: 0.5em; }

        .noteWrapper {
            background-color: var(--cream);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(74, 52, 39, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 85%, rgba(139, 69, 19, 0.4) 0%, transparent 35%),
                radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.1) 0%, transparent 50%),
                linear-gradient(45deg, rgba(74, 52, 39, 0.1) 25%, transparent 25%, transparent 50%, rgba(74, 52, 39, 0.1) 50%, rgba(74, 52, 39, 0.1) 75%, transparent 75%, transparent);
            background-size: 100% 100%, 100% 100%, 100% 100%, 4px 4px;
            padding: 1.2em;
            width: 100%; 
            font-size: .75em;
            line-height: 1.4;
            border: 3px solid var(--black); 
            transform: rotate(-3deg);
            color: #3d2b1f;
            font-family: 'Architects Daughter', cursive;
            z-index: 5;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.4);
            filter: contrast(1.1) brightness(0.9);
            margin-bottom: 0.5em;
        }

        .controlPadOuter {
            background-color: var(--case-dark);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(139, 69, 19, 0.3) 0%, transparent 60%),
                radial-gradient(circle at 0% 100%, rgba(74, 52, 39, 0.4) 0%, transparent 40%);
            padding: 1em;
            border: 3px solid var(--black); 
            margin-bottom: 1.5em;
            position: relative;
            width: 100%;
        }

        .controlPadWrapper {
            background: #000;
            border: 3px solid var(--black); 
            position: relative;
            overflow: hidden;
        }

        .controlPad {
            position: relative;
            width: 100%;
            height: 20em; 
            cursor: none;
            background: var(--screen-bg);
            border: 2px solid var(--black); 
        }

        #padGrid {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            stroke: var(--grid-line);
            stroke-width: 1px;
            pointer-events: none;
            opacity: 0.4;
        }

        .controlPadLabel {
            text-transform: lowercase;
            font-weight: bold;
            font-size: .7em;
            color: var(--grid-line);
            position: absolute;
            pointer-events: none;
            user-select: none;
        }
        .controlPadLabel_top { top: .5em; left: 50%; transform: translateX(-50%); }
        .controlPadLabel_bottom { bottom: .5em; left: 50%; transform: translateX(-50%); }
        .controlPadLabel_right { top: 50%; right: .5em; transform: translateY(-50%) rotate(90deg); }
        .controlPadLabel_left { top: 50%; left: .5em; transform: translateY(-50%) rotate(-90deg); }

        .waveTypeWrapper {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.8em; 
            width: 100%;
            margin-top: 0.5em;
        }

        .radioGroup label {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--button-flat); 
            border: 3px solid var(--black); 
            border-bottom-width: 0.3em;
            cursor: pointer;
            width: 4.5em; 
            height: 3em;  
            position: relative;
            top: 0;
            transition: all 0.1s;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
        }

        .radioGroup input[type="radio"] { display: none; }

        .radioGroup input[type="radio"]:checked + label {
            top: 0.15em;
            border-bottom-width: 0.1em;
            background: var(--button-active); 
        }

        .selectedIcon {
            width: 2em; 
            height: 2em;
            fill: var(--black);
            transition: fill 0.2s;
        }

        .radioGroup input[type="radio"]:checked + label .selectedIcon {
            fill: var(--white);
        }

        .controlPadMarker {
            position: absolute;
            width: 1.5em;
            height: 1.5em;
            background: var(--marker);
            border: 2px solid var(--black); 
            border-radius: 50%;
            margin-top: -.75em;
            margin-left: -.75em;
            display: none;
            pointer-events: none;
            z-index: 20;
        }
        .controlPadMarker.active {
            display: block;
            box-shadow: 0 0 10px var(--marker);
        }

        .controlPad:hover .controlPadMarker { display: block; }

        .rust-stain {
            position: absolute;
            background: var(--rust-dark);
            opacity: 0.5;
            pointer-events: none;
            border-radius: 50% 20% 40% 10%;
            filter: blur(1px);
        }

        .rust-1 { top: 5%; left: 75%; width: 5em; height: 2.5em; transform: rotate(10deg); background: var(--rust-mid); }
        .rust-2 { bottom: 5%; left: 8%; width: 3em; height: 6em; transform: rotate(-5deg); }
        .rust-3 { top: 45%; right: -1em; width: 4em; height: 4em; border-radius: 50%; opacity: 0.6; }
        .rust-4 { top: 80%; left: 40%; width: 6em; height: 2em; background: var(--rust-light); opacity: 0.3; }
        
        .rust-streak {
            position: absolute;
            width: 2px;
            background: linear-gradient(to bottom, var(--rust-dark), transparent);
            opacity: 0.6;
            pointer-events: none;
        }
        .streak-1 { top: 0; left: 15%; height: 80%; }
        .streak-2 { top: 0; left: 85%; height: 40%; }
        .streak-3 { top: 20%; left: 50%; height: 60%; width: 3px; opacity: 0.4; }

        .hidden { display: none; }
        .visuallyhidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>

<div class="hidden">

<div class="deviceBody">
    <div class="controlPadBase">
        <div class="rust-stain rust-1"></div>
        <div class="rust-stain rust-2"></div>
        <div class="rust-stain rust-3"></div>
        <div class="rust-stain rust-4"></div>
        <div class="rust-streak streak-1"></div>
        <div class="rust-streak streak-2"></div>
        <div class="rust-streak streak-3"></div>

        <div class="main-layout">
            <div class="left-panel">
                <div class="noteWrapper">
                    <p>screen = tone.<br>vertical = vol.<br>horizontal = pitch.<br><br>stay narrow! ٩(◕‿◕)۶</p>
                </div>

                <!-- indicator lights bestie !! ๑˃ᴗ˂)ﻭ -->
                <div class="fake-controls">
                    <div class="led red"><div class="led-glow"></div></div>
                    <div class="led red"><div class="led-glow"></div></div>
                    <div class="led yellow"><div class="led-glow"></div></div>
                    <div class="led yellow"><div class="led-glow"></div></div>
                    <div class="led green"><div class="led-glow"></div></div>
                    <div class="led green"><div class="led-glow"></div></div>
                </div>

                <!-- FLAT SERIAL PLATE bro !! -->
                <div class="serial-plate">
                    MODEL-RS909<br>SR-RES-0042
                </div>

                <!-- FLAT JACK PORTS bro !! -->
                <div class="ports-area">
                    <div class="jack-port"><span class="port-label">in</span></div>
                    <div class="jack-port"><span class="port-label">out</span></div>
                </div>
            </div>

            <div class="technical-panel">
                <div class="screw screw-tl"></div>
                <div class="screw screw-tr"></div>
                <div class="screw screw-bl"></div>
                <div class="screw screw-br"></div>

                <div class="controlPadOuter">
                    <div class="controlPadWrapper">
                        <div id="controlPad" class="controlPad">
                            <span class="controlPadLabel controlPadLabel_top">- pitch +</span>
                            <span class="controlPadLabel controlPadLabel_right">- vol +</span>
                            <span class="controlPadLabel controlPadLabel_bottom">- pitch +</span>
                            <span class="controlPadLabel controlPadLabel_left">- vol +</span>
                            
                            <svg id="padGrid" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" viewBox="0 0 401 321.5">
                                <path d="M200.5.2v321M240.5.2v321M160.5.2v321M320.5.2v321M360.5.2v321M280.5.2v321M80.5.2v321M120.5.2v321M40.5.2v321M400.5.2v321M200.5.2v321M.5 161h400M.5 121h400M.5 201h400M.5 40.5h400M.5.5h400M.5 80.5h400M.5 281h400M.5 241h400M.5 321h400" fill="none"></path>
                            </svg>
                            
                            <div id="controlPadMarker" class="controlPadMarker"></div>
                        </div>
                    </div>
                </div>

                <form id="waveTypeForm" name="waveTypeForm" class="waveTypeWrapper">
                    <div class="radioGroup">
                        <input type="radio" value="1" id="waveSelector_sine" name="waveSelector"/>
                        <label for="waveSelector_sine">
                            <h4 class="visuallyhidden">sine</h4>
                            <svg class="selectedIcon"><use xlink:href="#wave_sine" /></svg>
                        </label>
                    </div>
                    <div class="radioGroup">
                        <input type="radio" value="2" id="waveSelector_square" name="waveSelector"/>
                        <label for="waveSelector_square">
                            <h4 class="visuallyhidden">square</h4>
                            <svg class="selectedIcon"><use xlink:href="#wave_square" /></svg>
                        </label>
                    </div>
                    <div class="radioGroup">
                        <input type="radio" value="3" id="waveSelector_triangle" name="waveSelector" checked/>
                        <label for="waveSelector_triangle">
                            <h4 class="visuallyhidden">triangle</h4>
                            <svg class="selectedIcon"><use xlink:href="#wave_triangle" /></svg>
                        </label>
                    </div>
                    <div class="radioGroup">
                        <input type="radio" value="4" id="waveSelector_sawtooth" name="waveSelector"/>
                        <label for="waveSelector_sawtooth">
                            <h4 class="visuallyhidden">sawtooth</h4>
                            <svg class="selectedIcon"><use xlink:href="#wave_sawtooth" /></svg>
                        </label>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
const context = new (window.AudioContext || window.webkitAudioContext)();
const vco1 = context.createOscillator();
vco1.type = "triangle";
vco1.frequency.value = 440.0;

const vca = context.createGain();
vca.gain.value = 0;

const vco1vol = context.createGain();
vco1vol.gain.value = 1;

const master = context.createGain();
master.gain.value = 0.5;

var delay = context.createDelay();
delay.delayTime.value = 0;
var delay_feedback = context.createGain();
delay_feedback.gain.value = 0.2;
var delay_filter = context.createBiquadFilter();
delay_filter.frequency.value = 2000;

vco1.connect(vco1vol);
vco1vol.connect(vca);
vca.connect(master);
vca.connect(delay);
delay.connect(delay_feedback);
delay_feedback.connect(delay_filter);
delay_filter.connect(delay);
delay.connect(master);
master.connect(context.destination);

const controlPad = document.querySelector("#controlPad");
const controlPadMarker = document.querySelector("#controlPadMarker");

const state = {
    running: false,
    volumeInput: 0,
    pitchInput: 0,
    noteOn: false,
    notePersist: false,
};

const getPosition = (element) => ({
    top: window.scrollY + element.getBoundingClientRect().top,
    left: window.scrollX + element.getBoundingClientRect().left,
});

controlPad.addEventListener("mousedown", (e) => {
    if (!state.running) {
        vco1.start(0);
        state.running = true;
    }
    state.noteOn = true;
    const position = getPosition(controlPad);
    const rawVolInput = e.pageY - position.top;
    const rawPitchInput = e.pageX - position.left;
    setNote(rawVolInput, rawPitchInput);
});

controlPad.addEventListener("mouseleave", (e) => {
    if (state.noteOn) {
        state.notePersist = true;
    } else {
        state.notePersist = false;
    }
    state.noteOn = false;
    vca.gain.value = 0;
});

controlPad.addEventListener("mouseenter", (e) => {
    if (state.notePersist) {
        state.noteOn = true;
        const position = getPosition(controlPad);
        var rawVolInput = e.pageY - position.top;
        var rawPitchInput = e.pageX - position.left;
        setNote(rawVolInput, rawPitchInput);
    }
});

document.addEventListener("mouseup", (e) => {
    state.noteOn = false;
    state.notePersist = false;
    vca.gain.value = 0;
    controlPadMarker.classList.remove("active");
});

controlPad.addEventListener("mousemove", (e) => {
    const position = getPosition(controlPad);
    const rawVolInput = e.pageY - position.top;
    const rawPitchInput = e.pageX - position.left;
    if (state.noteOn) {
        setNote(rawVolInput, rawPitchInput);
    }
    setMarker(rawVolInput, rawPitchInput);
});

function setMarker(x, y) {
    controlPadMarker.style.top = x + "px";
    controlPadMarker.style.left = y + "px";
}

function setNote(volume, pitch) {
    state.volumeInput = parseNoteValue(volume);
    state.pitchInput = parsePitchValue(pitch);
    controlPadMarker.classList.add("active");

    vca.gain.value = state.volumeInput;
    vco1.frequency.value = state.pitchInput;
}

function parseNoteValue(input) {
    var output = input / controlPad.clientHeight;
    return Math.max(0, Math.min(1, 1 - output)).toFixed(2);
}

function parsePitchValue(input) {
    var output = input * 10;
    return output.toFixed(2);
}

var waveSelectorRadio = document.waveTypeForm.waveSelector;
for (var i = 0; i < waveSelectorRadio.length; i++) {
    waveSelectorRadio[i].onclick = function () {
        var rawWave = this.value;
        var waveType = parseWave(rawWave);
        setWave(waveType);
    };
}

function parseWave(int) {
    var string = int.toString();
    var waveType = false;
    switch (string) {
        case "1": waveType = "sine"; break;
        case "2": waveType = "square"; break;
        case "3": waveType = "triangle"; break;
        case "4": waveType = "sawtooth"; break;
    }
    return waveType;
}

function setWave(waveType) {
    vco1.type = waveType;
}

const leds = document.querySelectorAll('.led');
setInterval(() => {
    leds.forEach(led => {
        if (Math.random() > 0.9) {
            led.classList.toggle('active');
        }
    });
}, 150);
</script>

</body>
