<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Machine Master: Unit 10 Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #f8fbff;
            --primary: #2563eb;
            --accent: #f59e0b;
            --success: #10b981;
            --error: #ef4444;
            --panel: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text);
        }

        /* --- bright lab background --- */
        #lab-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, transparent 95%, rgba(37, 99, 235, 0.05) 95%);
            background-size: 30px 30px, 100% 100%;
            z-index: -1;
        }

        #game-container {
            width: 100%; height: 100%; display: grid;
            grid-template-rows: 100px 1fr 150px;
            padding: 20px; gap: 20px;
        }

        /* --- hud badges --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .hud-badge {
            background: var(--panel); border: 2px solid var(--border);
            padding: 12px 24px; border-radius: 100px; box-shadow: var(--shadow);
            display: flex; align-items: center; gap: 12px;
        }
        .hud-badge i { color: var(--primary); font-size: 1.2rem; }
        .hud-badge h2 { margin: 0; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: #94a3b8; }
        .hud-badge p { margin: 0; font-weight: 800; font-size: 1rem; color: var(--text); text-transform: lowercase; }

        /* --- main stage area --- */
        #stage {
            display: flex; justify-content: center; align-items: center;
            background: var(--panel); border-radius: 30px;
            border: 1px solid var(--border); box-shadow: var(--shadow);
            position: relative; overflow: hidden;
        }

        .stage-label {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            font-family: 'JetBrains Mono'; font-size: 0.7rem; color: #cbd5e1;
            text-transform: uppercase; letter-spacing: 5px;
        }

        .mech-svg { width: 100%; height: 90%; max-width: 700px; overflow: visible; }
        
        .part-animate { 
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* --- inventory workbench --- */
        footer {
            display: flex; justify-content: center; align-items: center;
        }

        .workbench {
            background: var(--panel); padding: 15px; border-radius: 25px;
            border: 1px solid var(--border); box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            display: flex; gap: 15px;
        }

        .tool-card {
            width: 85px; height: 100px; background: #f8fafc;
            border: 2px solid var(--border); border-radius: 18px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .tool-card:hover { transform: translateY(-5px); border-color: var(--primary); background: white; }
        .tool-card.active { 
            background: var(--primary); border-color: var(--primary); color: white;
            box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3);
        }
        .tool-card i { font-size: 1.8rem; margin-bottom: 8px; }
        .tool-card span { font-size: 0.5rem; text-transform: lowercase; font-weight: 800; letter-spacing: 1px; }

        /* --- alert overlays --- */
        #alert-overlay {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1000; pointer-events: none; opacity: 0;
            font-weight: 900; font-size: 3.5rem; text-align: center;
            text-transform: lowercase; letter-spacing: -1px;
        }
        .pop-msg { animation: popSnap 1.2s forwards; }
        @keyframes popSnap {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            15% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(1); }
        }

        .start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 0.5s;
        }
        .start-screen h1 { font-size: 3.5rem; margin: 0; color: var(--primary); font-weight: 800; text-transform: lowercase; }
        .start-btn {
            background: var(--primary); color: white; border: none; padding: 18px 60px;
            border-radius: 100px; font-weight: 800; font-size: 1.2rem; cursor: pointer;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); margin-top: 40px; transition: 0.2s;
            text-transform: lowercase;
        }
        .start-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        .rope-flow {
            stroke-dasharray: 12, 6;
            transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

    </style>
</head>
<body>

    <div id="lab-bg"></div>

    <div id="start-menu" class="start-screen">
        <div style="font-size: 5rem;">⚙️</div>
        <h1>machine master</h1>
        <p style="color: #64748b; letter-spacing: 2px; text-transform: lowercase; font-size: 0.8rem; margin-top: 10px;">year 4 science lab</p>
        <button class="start-btn" onclick="initSystem()">boot_system</button>
    </div>

    <div id="alert-overlay">correct!</div>

    <div id="game-container">
        <header>
            <div class="hud-badge">
                <i class="fa-solid fa-microscope"></i>
                <div>
                    <h2>mission</h2>
                    <p id="mission-text">scanning...</p>
                </div>
            </div>
            <div class="hud-badge" style="text-align: right;">
                <div>
                    <h2>module</h2>
                    <p id="stage-text">01 / 05</p>
                </div>
                <i class="fa-solid fa-bolt"></i>
            </div>
        </header>

        <main id="stage">
            <div class="stage-label">high_res_viewport</div>
            <div id="svg-container" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center;"></div>
        </main>

        <footer>
            <div class="workbench">
                <div class="tool-card" id="tool-lever" onclick="checkTool('lever')">
                    <i class="fa-solid fa-bars-staggered"></i>
                    <span>lever</span>
                </div>
                <div class="tool-card" id="tool-pulley" onclick="checkTool('pulley')">
                    <i class="fa-solid fa-circle-notch"></i>
                    <span>pulley</span>
                </div>
                <div class="tool-card" id="tool-ramp" onclick="checkTool('ramp')">
                    <i class="fa-solid fa-ruler-horizontal"></i>
                    <span>ramp</span>
                </div>
                <div class="tool-card" id="tool-wedge" onclick="checkTool('wedge')">
                    <i class="fa-solid fa-caret-up"></i>
                    <span>wedge</span>
                </div>
                <div class="tool-card" id="tool-gear" onclick="checkTool('gear')">
                    <i class="fa-solid fa-gear"></i>
                    <span>wheels</span>
                </div>
                <div class="tool-card" id="tool-screw" onclick="checkTool('screw')">
                    <i class="fa-solid fa-bolt"></i>
                    <span>screw</span>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const LAB_DATA = [
            {
                task: "the heavy engine core is offline. use a lever to lift it onto the maintenance rail!",
                key: "lever",
                svg: `
                    <svg viewBox="0 0 600 400" class="mech-svg">
                        <rect x="0" y="360" width="600" height="40" fill="#f1f5f9" />
                        <path d="M280 360 L310 320 L340 360 Z" fill="#94a3b8" />
                        <g id="lever-system" class="part-animate" style="transform-origin: 310px 320px;">
                            <rect x="100" y="310" width="420" height="15" fill="#475569" rx="7" />
                            <g id="load">
                                <rect x="120" y="210" width="100" height="100" fill="#334155" rx="8" stroke="var(--primary)" stroke-width="2" />
                                <text x="135" y="265" fill="white" font-weight="800" font-size="14" font-family="Outfit">1000KG</text>
                                <circle cx="170" cy="235" r="8" fill="var(--accent)" />
                                <rect x="130" y="220" width="80" height="10" fill="white" opacity="0.1" rx="2" />
                            </g>
                        </g>
                    </svg>
                `,
                win: () => {
                    document.getElementById('lever-system').style.transform = 'rotate(-15deg)';
                }
            },
            {
                task: "the circuit box is jammed shut. we need a sharp wedge to force the doors open!",
                key: "wedge",
                svg: `
                    <svg viewBox="0 0 600 400" class="mech-svg">
                        <rect x="0" y="360" width="600" height="40" fill="#f1f5f9" />
                        <g id="door-group">
                            <rect x="250" y="150" width="100" height="210" fill="#cbd5e1" id="door-l" class="part-animate" rx="4" />
                            <rect x="300" y="150" width="50" height="210" fill="#94a3b8" id="door-r" class="part-animate" rx="4" />
                            <rect x="298" y="150" width="4" height="210" fill="white" id="gap" />
                        </g>
                        <g id="tool-wedge" class="part-animate" transform="translate(300, 40)">
                            <path d="M-25 0 L25 0 L0 110 Z" fill="white" stroke="var(--primary)" stroke-width="4" />
                            <rect x="-6" y="-50" width="12" height="50" fill="#475569" />
                        </g>
                    </svg>
                `,
                win: () => {
                    document.getElementById('tool-wedge').style.transform = 'translate(300px, 170px)';
                    setTimeout(() => {
                        document.getElementById('door-l').style.transform = 'translateX(-130px) rotate(-5deg)';
                        document.getElementById('door-r').style.transform = 'translateX(130px) rotate(5deg)';
                        document.getElementById('gap').style.opacity = '0';
                    }, 350);
                }
            },
            {
                task: "a component package is stuck in the lower bay. deploy a pulley to hoist it up!",
                key: "pulley",
                svg: `
                    <svg viewBox="0 0 600 400" class="mech-svg">
                        <defs>
                            <clipPath id="rope-clip">
                                <rect x="0" y="100" width="600" height="400" />
                            </clipPath>
                        </defs>
                        
                        <rect x="240" y="0" width="120" height="20" fill="#e2e8f0" />
                        
                        <!-- rotating wheel -->
                        <circle cx="300" cy="100" r="55" fill="white" stroke="var(--primary)" stroke-width="12" id="wheel" class="part-animate" style="transform-origin: 300px 100px;" />
                        <circle cx="300" cy="100" r="8" fill="#475569" />

                        <!-- rope path -->
                        <path d="M245 400 L245 100 A 55 55 0 0 1 355 100 L355 210" 
                              fill="none" 
                              stroke="#94a3b8" 
                              stroke-width="6" 
                              id="rope"
                              class="rope-flow" 
                              stroke-dashoffset="0" />
                        
                        <!-- left handle - moves down -->
                        <g id="handle" class="part-animate">
                           <rect x="235" y="370" width="20" height="15" fill="#475569" rx="2" />
                        </g>

                        <!-- right cargo -->
                        <g id="lift-system" class="part-animate">
                            <g id="cargo">
                                <rect x="310" y="210" width="90" height="70" fill="#334155" rx="5" />
                                <text x="325" y="250" fill="white" font-weight="800" font-size="10" font-family="JetBrains Mono">CARGO_04</text>
                            </g>
                        </g>
                    </svg>
                `,
                win: () => {
                    document.getElementById('wheel').style.transform = 'rotate(1080deg)';
                    document.getElementById('lift-system').style.transform = 'translateY(-60px)';
                    document.getElementById('handle').style.transform = 'translateY(60px)';
                    document.getElementById('rope').style.strokeDashoffset = "60";
                }
            },
            {
                task: "the transport bot is immobilized. we need a wheel and axle system to move it out!",
                key: "gear",
                svg: `
                    <svg viewBox="0 0 600 400" class="mech-svg">
                        <rect x="0" y="360" width="600" height="40" fill="#f1f5f9" />
                        <g id="bot" class="part-animate">
                            <rect x="120" y="200" width="280" height="110" fill="#334155" rx="20" stroke="#475569" stroke-width="4" />
                            <rect x="150" y="160" width="220" height="40" fill="#1e293b" rx="10" />
                            <rect x="320" y="175" width="30" height="10" fill="var(--cyber-blue)" opacity="0.6" />
                            <circle cx="170" cy="310" r="50" fill="white" stroke="var(--accent)" stroke-width="10" stroke-dasharray="20,10" id="rw1" class="part-animate" style="transform-origin: 170px 310px;" />
                            <circle cx="350" cy="310" r="50" fill="white" stroke="var(--accent)" stroke-width="10" stroke-dasharray="20,10" id="rw2" class="part-animate" style="transform-origin: 350px 310px;" />
                        </g>
                    </svg>
                `,
                win: () => {
                    document.getElementById('bot').style.transform = 'translateX(500px)';
                    document.getElementById('rw1').style.transform = 'rotate(1440deg)';
                    document.getElementById('rw2').style.transform = 'rotate(1440deg)';
                }
            },
            {
                task: "the fuel barrel is on the high deck. deploy a ramp to roll it down to the storage bay!",
                key: "ramp",
                svg: `
                    <svg viewBox="0 0 600 400" class="mech-svg">
                        <rect x="0" y="360" width="600" height="40" fill="#f1f5f9" />
                        <!-- loading dock (top right) -->
                        <rect x="420" y="150" width="180" height="210" fill="#e2e8f0" rx="4" />
                        <rect x="420" y="140" width="180" height="10" fill="#94a3b8" />
                        
                        <!-- the ramp -->
                        <path d="M100 360 L420 360 L420 150 Z" fill="rgba(37, 99, 235, 0.05)" stroke="var(--primary)" stroke-width="2" stroke-dasharray="8,4" id="ramp-visual" class="part-animate" />

                        <!-- the barrel - starts at the top (x=450, y=70) -->
                        <g id="barrel" class="part-animate" style="transform-origin: 480px 110px;">
                            <rect x="450" y="70" width="60" height="80" fill="#334155" rx="5" />
                            <rect x="450" y="85" width="60" height="5" fill="var(--accent)" />
                            <rect x="450" y="130" width="60" height="5" fill="var(--accent)" />
                            <text x="460" y="115" fill="white" font-weight="800" font-size="8" font-family="JetBrains Mono">FUEL_X</text>
                        </g>
                    </svg>
                `,
                win: () => {
                    const ramp = document.getElementById('ramp-visual');
                    ramp.style.fill = "rgba(37, 99, 235, 0.2)";
                    ramp.style.strokeDasharray = "0";
                    // roll barrel DOWN the slope (roughly -350x, +210y)
                    document.getElementById('barrel').style.transform = 'translate(-350px, 210px) rotate(-720deg)';
                }
            }
        ];

        let currentIdx = 0;
        const AudioSys = {
            ctx: null,
            init() { if(!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            play(f, d=0.1) {
                this.init(); const o = this.ctx.createOscillator(); const g = this.ctx.createGain();
                o.frequency.setValueAtTime(f, this.ctx.currentTime);
                g.gain.setValueAtTime(0.05, this.ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                o.connect(g); g.connect(this.ctx.destination);
                o.start(); o.stop(this.ctx.currentTime + d);
            }
        };

        function initSystem() {
            AudioSys.play(800);
            document.getElementById('start-menu').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-menu').style.display = 'none';
                loadLevel();
            }, 500);
        }

        function loadLevel() {
            const data = LAB_DATA[currentIdx];
            document.getElementById('mission-text').innerText = data.task;
            document.getElementById('stage-text').innerText = `0${currentIdx + 1} / 05`;
            document.getElementById('svg-container').innerHTML = data.svg;
            document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('active'));
        }

        function checkTool(type) {
            const data = LAB_DATA[currentIdx];
            const alert = document.getElementById('alert-overlay');
            
            document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`tool-${type}`).classList.add('active');

            if (type === data.key) {
                AudioSys.play(1000, 0.3);
                alert.innerText = "module_synced!";
                alert.style.color = "var(--success)";
                alert.className = "pop-msg";
                
                data.win();

                setTimeout(() => {
                    alert.className = "";
                    currentIdx++;
                    if (currentIdx < LAB_DATA.length) {
                        loadLevel();
                    } else {
                        winGame();
                    }
                }, 2500);
            } else {
                AudioSys.play(150, 0.3);
                alert.innerText = "system_error";
                alert.style.color = "var(--error)";
                alert.className = "pop-msg";
                setTimeout(() => alert.className = "", 1000);
            }
        }

        function winGame() {
            document.getElementById('game-container').innerHTML = `
                <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
                    <div style="font-size: 8rem; filter: drop-shadow(0 0 30px var(--primary));">⚙️✨🏆</div>
                    <h1 style="font-size: 3rem; color: var(--primary); font-weight: 800; margin: 20px 0; text-transform: lowercase;">mission complete</h1>
                    <p style="color: #64748b; font-size: 1.1rem; text-transform: lowercase;">you are a master of simple machines!</p>
                    <button class="start-btn" onclick="location.reload()">re-initialize</button>
                </div>
            `;
            AudioSys.play(523, 0.5);
            setTimeout(() => AudioSys.play(1046, 0.5), 150);
        }
    </script>
</body>
</html>
