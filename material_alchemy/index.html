<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>material alchemy: garage shift</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #ff4757;
            --plants: #2ed573;
            --animals: #ffa502;
            --rocks: #3498db;
            --petroleum: #4b5563; 
            --font-title: 'Titan One', cursive;
            --font-main: 'Outfit', sans-serif;
            --gold: #f1c40f;
            --gold-dark: #c29d0b;
            --brick-red: #b35555; 
            --mortar: #8e3a3a;
            --can-border: #374151; 
            --pipe-gray: #95a5a6;
            --pipe-dark: #7f8c8d;
            --flat-shadow: 6px 6px 0px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; height: 100dvh; 
            overflow: hidden; font-family: var(--font-main);
            background: #f1f2f6;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- flat 2d wall logic --- */
        #garage-env {
            position: fixed; inset: 0;
            background-color: var(--brick-red);
            background-image: 
                linear-gradient(var(--mortar) 4px, transparent 4px),
                linear-gradient(90deg, var(--mortar) 4px, transparent 4px),
                linear-gradient(90deg, var(--mortar) 4px, transparent 4px);
            background-size: 100% 50px, 100px 100px, 100px 100px;
            background-position: 0 0, 0 0, 50px 50px;
            z-index: -4;
        }

        .wall-stain {
            position: absolute; opacity: 0.2; pointer-events: none;
            z-index: -3;
        }

        /* --- 2d pipelines --- */
        .pipe {
            position: absolute; background: var(--pipe-gray);
            border: 4px solid var(--can-border);
            z-index: -3;
        }
        .pipe::before {
            content: ''; position: absolute; top: 0; left: 0;
            background: rgba(255,255,255,0.3);
        }
        .pipe-h::before { width: 100%; height: 30%; }
        .pipe-v::before { width: 30%; height: 100%; }

        .pipe-joint {
            position: absolute; background: var(--pipe-dark);
            border: 4px solid var(--can-border); width: 30px; height: 30px;
            z-index: -2;
        }
        .pipe-valve {
            position: absolute; width: 40px; height: 40px;
            background: var(--primary); border: 4px solid var(--can-border);
            border-radius: 50%; z-index: -2;
        }
        .pipe-valve::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 70%; height: 6px; background: var(--can-border);
            transform: translate(-50%, -50%) rotate(45deg);
        }

        #concrete-floor {
            position: fixed; bottom: 0; width: 100%; height: 38%;
            background: #aab7b8; 
            border-top: 6px solid var(--can-border);
            z-index: -1;
            overflow: hidden;
        }

        .floor-stain {
            position: absolute; border-radius: 50%; opacity: 0.35;
        }

        /* workshop lamp */
        .workshop-light {
            position: fixed; top: 0; left: 50%; transform: translateX(-50%);
            width: 120px; height: 300px; pointer-events: none; z-index: 5;
        }
        .workshop-light div { position: absolute; }
        .light-wire {
            top: 0; left: 50%; width: 4px; height: 100px;
            background: var(--can-border); transform: translateX(-50%);
        }
        .light-head {
            top: 100px; left: 50%; width: 60px; height: 30px;
            background: #7f8d8d; border: 4px solid var(--can-border);
            border-radius: 30px 30px 4px 4px; transform: translateX(-50%);
        }
        .light-beam {
            top: 130px; left: 50%;
            width: 300px; height: 500px; transform: translateX(-50%);
            background: rgba(241, 196, 15, 0.1);
            clip-path: polygon(40% 0, 60% 0, 100% 100%, 0 100%);
        }

        /* --- spray cans --- */
        .can-set {
            position: fixed; bottom: 12%; z-index: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        .custom-can { 
            width: 48px; height: 110px; position: relative; 
            filter: drop-shadow(var(--flat-shadow));
        }

        .c-body { 
            width: 100%; height: 70%; 
            background: #eceff1; 
            border: 4px solid var(--can-border); 
            border-radius: 4px; position: absolute; bottom: 0; 
            overflow: hidden;
        }
        .c-body::before { 
            content: ''; position: absolute; top: 0; left: 0; width: 40%; height: 100%;
            background: rgba(255,255,255,0.6);
        }

        .can-red .c-body::after {
            content: ''; position: absolute; bottom: 8px; left: 12px; width: 12px; height: 12px;
            background: #8e3a3a; border-radius: 50%; 
            box-shadow: 10px -5px 0 #8e3a3a, 15px 5px 0 -2px #8e3a3a;
        }

        .can-green .c-body::after {
            content: ''; position: absolute; top: 30%; left: 0; width: 100%; height: 6px;
            background: #4b5563; opacity: 0.2; transform: rotate(-5deg);
        }

        .can-blue .c-body::after {
            content: ''; position: absolute; top: -2px; left: 20px; width: 8px; height: 30px;
            background: #4b5563; border-radius: 0 0 4px 4px; opacity: 0.3;
        }
        
        .c-label { 
            width: calc(100% + 8px); height: 32px; 
            background: var(--color); 
            border: 4px solid var(--can-border); 
            position: absolute; top: 15px; left: -4px;
            z-index: 4; 
        }
        
        .c-shoulder {
            width: 100%; height: 18px;
            background: #bdc3c7;
            border: 4px solid var(--can-border); 
            border-radius: 50% 50% 0 0;
            position: absolute; bottom: 68%; left: 0;
        }

        .c-rim {
            width: 60%; height: 10px;
            background: #95a5a6; border: 4px solid var(--can-border);
            position: absolute; bottom: 80%; left: 20%; z-index: 2;
        }

        .c-actuator {
            width: 40%; height: 14px; 
            background: #7f8d8d; 
            border: 4px solid var(--can-border);
            position: absolute; bottom: 88%; left: 30%;
            border-radius: 2px;
        }

        /* --- game container styling --- */
        #game-container {
            width: 700px; height: 480px; 
            max-width: 95vw; max-height: 95vh;
            background: #ffffff; 
            border: 4px solid var(--can-border);
            border-radius: 0; 
            box-shadow: 12px 12px 0px rgba(0,0,0,0.1);
            display: none; 
            flex-direction: column; 
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .hud {
            padding: 10px 25px; 
            display: flex; justify-content: space-between;
            align-items: center; background: #4b5563; 
            color: white; border-bottom: 4px solid var(--can-border);
        }

        .home-btn {
            width: 42px; height: 42px;
            background: #fff; border: 3px solid var(--can-border);
            color: var(--can-border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer;
            transition: 0.1s;
        }
        .home-btn:hover { background: var(--gold); }
        .home-btn:active { transform: scale(0.9); }

        .hud-display { display: flex; flex-direction: column; align-items: center; }
        .hud-label { font-size: 0.7rem; color: #d1d5db; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .hud-value { font-family: var(--font-title); font-size: 2rem; color: #fff; line-height: 1; }
        .timer-val { color: var(--gold); }

        .play-area {
            flex: 1; display: grid; grid-template-columns: 1fr 260px;
            padding: 15px; gap: 15px; min-height: 0;
            background-color: #f1f2f6; 
        }

        .center-stage {
            background: #ffffff; 
            border: 4px solid var(--can-border);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative;
        }
        
        #drag-item {
            width: 120px; height: 120px; background: #ffffff;
            border: 4px solid var(--can-border);
            display: flex; justify-content: center; align-items: center;
            font-size: 5.5rem; cursor: grab; transition: 0.1s;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.05);
        }
        
        .item-tag {
            margin-top: 15px; background: var(--gold); color: var(--can-border); padding: 8px 25px;
            font-family: var(--font-title); font-size: 1.4rem;
            border: 4px solid var(--can-border);
            box-shadow: 4px 4px 0px #000;
        }

        .bins-list { display: flex; flex-direction: column; gap: 8px; justify-content: center; }
        .bin {
            background: #ffffff; 
            border: 4px solid var(--can-border);
            padding: 10px;
            display: flex; align-items: center; gap: 12px;
            transition: 0.2s;
            height: 22%; position: relative;
        }
        .bin i { 
            width: 45px; height: 45px; border: 3px solid var(--can-border);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; color: #fff; flex-shrink: 0;
        }
        .bin-title { font-family: var(--font-title); font-size: 1rem; margin: 0; color: var(--can-border); line-height: 1; }
        .bin-desc { font-size: 0.65rem; margin: 2px 0 0 0; color: #7f8c8d; font-weight: 700; text-transform: uppercase; line-height: 1; }
        .bin.drag-over { background: var(--gold); transform: translate(-6px, -3px); box-shadow: 6px 3px 0px var(--can-border); }

        /* --- overlays --- */
        #start-page {
            position: fixed; inset: 0;
            z-index: 1000; 
            display: flex; 
            flex-direction: column;
            justify-content: flex-start; 
            align-items: center; 
            text-align: center;
            padding-top: 22vh; 
        }

        /* --- RESTART SCREEN --- */
        #end-overlay {
            position: absolute; 
            inset: 0;
            background: #ffffff; 
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--can-border); 
            padding: 20px;
        }

        #end-overlay h1 {
            font-family: var(--font-title); font-size: 3rem; 
            margin: 0; color: var(--gold); 
            line-height: 0.85; letter-spacing: 1px;
            background: #fff; 
            padding: 20px 40px; 
            border: 4px solid var(--can-border);
            transform: rotate(-1deg);
            -webkit-text-stroke: 1.2px var(--can-border);
        }

        /* REMOVED THE BOX FROM QUOTA FAILED TEXT! bestie ᕙ(⇀‸↼‶)ᕗ */
        #end-overlay p {
            font-size: 1.2rem; 
            color: var(--can-border); 
            font-weight: 900; 
            text-transform: uppercase; 
            margin-top: 20px; 
            margin-bottom: 35px; 
            letter-spacing: 4px;
            background: none; 
            padding: 0;
            border: none;
            transform: none;
        }

        #start-page h1 { 
            font-family: var(--font-title); font-size: 4rem; 
            margin: 0; color: var(--gold); 
            line-height: 0.85; letter-spacing: 1px;
            background: #fff; 
            padding: 25px 50px; 
            border: 6px solid var(--can-border);
            box-shadow: none; 
            transform: rotate(-1deg);
            position: relative;
            -webkit-text-stroke: 1.5px var(--can-border);
        }
        
        #start-page p { 
            font-size: 1rem; color: #fff; font-weight: 900; text-transform: uppercase; 
            margin-top: 12px; 
            margin-bottom: 12px;
            letter-spacing: 4px;
            background: var(--mortar); padding: 6px 25px;
            border: 4px solid var(--can-border);
            box-shadow: none; 
            transform: rotate(1deg);
            z-index: 5;
        }

        .btn-premium {
            background: var(--gold); 
            color: var(--can-border); 
            border: 5px solid var(--can-border);
            padding: 16px 55px; 
            font-size: 1.8rem; 
            font-family: var(--font-title); cursor: pointer; 
            transition: 0.1s;
            position: relative;
            box-shadow: none; 
            text-transform: uppercase;
        }
        
        .btn-wrapper {
            position: relative; padding: 10px;
            background: repeating-linear-gradient(45deg, var(--gold), var(--gold) 10px, #fff 10px, #fff 20px);
            border: 5px solid var(--can-border);
            box-shadow: none; 
            margin-top: 0;
        }

        .btn-premium:hover { transform: scale(1.05); }
        .btn-premium:active { transform: scale(0.95); }

        @media (max-width: 850px) {
            #start-page { padding-top: 12vh; }
            #start-page h1, #end-overlay h1 { font-size: 2.8rem; padding: 20px 30px; }
            #start-page p { font-size: 0.8rem; letter-spacing: 2px; }
            #end-overlay p { font-size: 0.9rem; letter-spacing: 2px; }
            .btn-premium { padding: 12px 30px; font-size: 1.4rem; }
            #game-container { width: 100%; height: 100%; border: none; }
            .play-area { grid-template-columns: 1fr; grid-template-rows: 1fr 1.6fr; gap: 10px; padding: 10px; }
            #drag-item { width: 110px; height: 110px; font-size: 4rem; }
            .bin i { width: 35px; height: 35px; }
        }
    </style>
</head>
<body>

    <!-- workshop extras -->
    <div id="workshop-light-fx" class="workshop-light">
        <div class="light-wire"></div>
        <div class="light-head"></div>
        <div class="light-beam"></div>
    </div>

    <!-- flat wall with stains and pipeline -->
    <div id="garage-env">
        <div class="wall-stain" style="width: 200px; height: 150px; background: #000; top: 10%; left: 5%; border-radius: 30% 70% 70% 30% / 50% 30% 70% 50%;"></div>
        <div class="wall-stain" style="width: 150px; height: 80px; background: #000; top: 60%; right: 15%; border-radius: 60% 40% 30% 70% / 40% 60% 70% 30%;"></div>
        
        <div class="pipe pipe-v" style="width: 24px; height: 65%; left: 15%; top: 0;"></div>
        <div class="pipe pipe-h" style="width: 100%; height: 24px; top: 25%; left: 0;"></div>
        
        <div class="pipe-joint" style="top: calc(25% - 4px); left: calc(15% - 4px);"></div>
        <div class="pipe-valve" style="top: calc(25% - 12px); right: 20%;"></div>

        <div class="wall-stain" style="width: 100px; height: 100px; background: #ff4757; top: 35%; left: 25%; border-radius: 50%; opacity: 0.15;"></div>
        <div class="wall-stain" style="width: 120px; height: 60px; background: #3498db; bottom: 45%; right: 40%; border-radius: 20% 80% 50% 50%; opacity: 0.15;"></div>
    </div>

    <div id="concrete-floor">
        <div class="floor-stain" style="width: 120px; height: 40px; background: #ff4757; bottom: 20%; right: 10%; border-radius: 40% 60% 30% 70% / 60% 30% 70% 40%;"></div>
        <div class="floor-stain" style="width: 80px; height: 30px; background: #3498db; bottom: 60%; left: 15%; border-radius: 50% 50% 20% 80% / 30% 70% 30% 70%;"></div>
        <div class="floor-stain" style="width: 100px; height: 25px; background: #8e3a3a; top: 15%; left: 40%; border-radius: 80% 20% 50% 50% / 20% 80% 50% 50%;"></div>
        <div class="floor-stain" style="width: 60px; height: 60px; background: #964b00; bottom: 5%; right: 30%; border-radius: 30% 70% 70% 30% / 50% 50% 50% 50%; opacity: 0.2;"></div>
    </div>

    <div class="can-set can-red" style="left: 10%;">
        <div class="custom-can" style="--color: #ff4757;">
            <div class="c-actuator"></div>
            <div class="c-rim"></div>
            <div class="c-shoulder"></div>
            <div class="c-body"><div class="c-label"></div></div>
        </div>
    </div>
    
    <div class="can-set can-green" style="left: 28%;">
        <div class="custom-can" style="--color: #2ed573; transform: rotate(90deg) translateY(-25px); transform-origin: bottom center;">
            <div class="c-actuator"></div>
            <div class="c-rim"></div>
            <div class="c-shoulder"></div>
            <div class="c-body"><div class="c-label"></div></div>
        </div>
    </div>

    <div class="can-set can-blue" style="right: 12%;">
        <div class="custom-can" style="--color: #3498db;">
            <div class="c-actuator"></div>
            <div class="c-rim"></div>
            <div class="c-shoulder"></div>
            <div class="c-body"><div class="c-label"></div></div>
        </div>
    </div>

    <div id="start-page">
        <h1>material<br>alchemy</h1>
        <p>vector edition</p>
        <div class="btn-wrapper">
            <button class="btn-premium" onclick="initGame()">start shift</button>
        </div>
    </div>

    <!-- GAME CONTAINER -->
    <div id="game-container">
        <!-- end overlay now inside the container! -->
        <div id="end-overlay">
            <h1 id="result-title">shift done!</h1>
            <p id="result-stat">quota reached</p>
            <div class="btn-wrapper">
                <button class="btn-premium" onclick="initGame()">restart shift</button>
            </div>
        </div>

        <div class="hud">
            <div class="home-btn" title="go home" onclick="location.reload()">
                <i class="fa-solid fa-house"></i>
            </div>

            <div class="hud-display">
                <span class="hud-label">quota</span>
                <span id="score-val" class="hud-value">00</span>
            </div>
            <div class="hud-display">
                <span class="hud-label">time left</span>
                <span id="timer-val" class="hud-value timer-val">45</span>
            </div>
        </div>

        <div class="play-area">
            <div class="center-stage">
                <div id="drag-item" draggable="true">🍎</div>
                <div class="item-tag" id="item-name">juicy apple</div>
            </div>

            <div class="bins-list">
                <div class="bin p-plants" data-source="plants">
                    <i class="fa-solid fa-leaf" style="background: var(--plants)"></i>
                    <div>
                        <p class="bin-title">plants</p>
                        <p class="bin-desc">organic flora & trees</p>
                    </div>
                </div>
                <div class="bin p-animals" data-source="animals">
                    <i class="fa-solid fa-cow" style="background: var(--animals)"></i>
                    <div>
                        <p class="bin-title">animals</p>
                        <p class="bin-desc">fur, wool & wild life</p>
                    </div>
                </div>
                <div class="bin p-rocks" data-source="rocks">
                    <i class="fa-solid fa-mountain" style="background: var(--rocks)"></i>
                    <div>
                        <p class="bin-title">rocks & soil</p>
                        <p class="bin-desc">minerals, clay & earth</p>
                    </div>
                </div>
                <div class="bin p-petroleum" data-source="petroleum">
                    <i class="fa-solid fa-oil-can" style="background: var(--petroleum)"></i>
                    <div>
                        <p class="bin-title">petroleum</p>
                        <p class="bin-desc">plastics & fossil power</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const materialBank = [
            { name: "WOODEN CHAIR", emoji: "🪑", source: "plants" },
            { name: "WOOL SWEATER", emoji: "🧶", source: "animals" },
            { name: "GOLD RING", emoji: "💍", source: "rocks" },
            { name: "PLASTIC BOTTLE", emoji: "🧴", source: "petroleum" },
            { name: "JUICY APPLE", emoji: "🍎", source: "plants" }, 
            { name: "LEATHER BOOT", emoji: "🥾", source: "animals" },
            { name: "GLASS VASE", emoji: "🏺", source: "rocks" },
            { name: "COTTON SHIRT", emoji: "👕", source: "plants" },
            { name: "NYLON ROPE", emoji: "🪢", source: "petroleum" },
            { name: "IRON NAIL", emoji: "🔩", source: "rocks" },
            { name: "SILK SCARF", emoji: "🧣", source: "animals" },
            { name: "CANDLE WAX", emoji: "🕯️", source: "petroleum" }
        ];

        let deck = [];
        let currentIndex = 0;
        let score = 0;
        let timeLeft = 45;
        let gameActive = false;
        let timerInterval;

        const dragItem = document.getElementById('drag-item');
        const itemName = document.getElementById('item-name');
        const scoreDisplay = document.getElementById('score-val');
        const timerDisplay = document.getElementById('timer-val');
        const bins = document.querySelectorAll('.bin');
        const gameContainer = document.getElementById('game-container');
        const startPage = document.getElementById('start-page');
        const lightFX = document.getElementById('workshop-light-fx');

        dragItem.addEventListener('dragstart', (e) => {
            if(!gameActive) return;
            e.dataTransfer.setData('text/plain', deck[currentIndex].source);
            dragItem.style.opacity = "0.2";
        });

        dragItem.addEventListener('dragend', () => dragItem.style.opacity = "1");

        bins.forEach(bin => {
            bin.addEventListener('dragover', (e) => { e.preventDefault(); bin.classList.add('drag-over'); });
            bin.addEventListener('dragleave', () => bin.classList.remove('drag-over'));
            bin.addEventListener('drop', (e) => {
                e.preventDefault();
                bin.classList.remove('drag-over');
                const source = e.dataTransfer.getData('text/plain');
                if (source === bin.dataset.source) handleCorrect();
                else handleWrong(bin);
            });
        });

        function handleCorrect() {
            score++;
            scoreDisplay.innerText = String(score).padStart(2, '0');
            currentIndex++;
            if (currentIndex >= deck.length) endGame(true);
            else updateDisplay();
        }

        function handleWrong(bin) {
            bin.style.background = '#ff4757';
            setTimeout(() => bin.style.background = '#ffffff', 300);
        }

        function initGame() {
            startPage.style.display = 'none'; 
            lightFX.style.display = 'none';
            gameContainer.style.display = 'flex'; 
            document.getElementById('end-overlay').style.display = 'none';
            deck = [...materialBank].sort(() => Math.random() - 0.5).slice(0, 10);
            score = 0; currentIndex = 0; timeLeft = 45; gameActive = true;
            scoreDisplay.innerText = "00";
            updateDisplay();
            startTimer();
        }

        function updateDisplay() {
            const item = deck[currentIndex];
            dragItem.innerText = item.emoji;
            itemName.innerText = item.name.toLowerCase();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                if(timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function endGame(win) {
            gameActive = false;
            clearInterval(timerInterval);
            const ov = document.getElementById('end-overlay');
            const res = document.getElementById('result-title');
            const stat = document.getElementById('result-stat');
            ov.style.display = 'flex';
            res.innerText = win ? "shift done!" : "quota failed";
            stat.innerText = win ? `scored ${score}/10` : `out of time! score: ${score}/10`;
        }
    </script>
</body>
</html>
